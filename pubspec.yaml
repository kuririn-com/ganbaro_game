name: ganbaro_game
description: "Block Pop - A professional physics puzzle game."
publish_to: 'none'
version: 1.0.0+6

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.11.0
  flame_forge2d: ^0.18.1
  cupertino_icons: ^1.0.8
  audioplayers: ^6.6.0
  shared_preferences: ^2.5.5
  google_mobile_ads: ^7.0.0
  app_tracking_transparency: ^2.0.6+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/

# アイコン生成設定（flutter_icons から flutter_launcher_icons に修正済み）
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true # iOS用背景透過エラー防止：有効